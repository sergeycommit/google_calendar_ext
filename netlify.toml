# Netlify configuration.
# The whole project folder is deployed, so these rules make sure non-public /
# duplicate content is never served — even though the files exist in the upload.
# `force = true` is required so the redirect wins over the real static file.

# --- Block syndication drafts (duplicate content) and the scheduler ---
[[redirects]]
  from = "/blog/medium/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/blog/substack/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/blog/devto/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/blog/hackernews/*"
  to = "/404.html"
  status = 404
  force = true

# Defense-in-depth: the scheduler folder should not be in the deploy at all,
# but block it too in case it ever gets uploaded again.
[[redirects]]
  from = "/cal_blog_scheduler/*"
  to = "/404.html"
  status = 404
  force = true

# Reinforce the canonical homepage URL (/, not /index.html).
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# --- Security headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
